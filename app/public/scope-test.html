<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#17120f" />
    <link rel="icon" href="/time/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/time/icon.svg" />
    <title>Scope Test</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #17120f;
        --card: #251f1d;
        --card-alt: #1d1816;
        --border: #514640;
        --muted: #b6ada8;
        --muted-strong: #d9d2cf;
        --ink: #f5f1ef;
        --accent: #e27658;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.26);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at 15% 0%, rgba(226, 118, 88, 0.14), transparent 32rem),
          var(--bg);
        color: var(--ink);
      }

      .app {
        width: min(100%, 980px);
        margin: 0 auto;
        padding: calc(env(safe-area-inset-top) + 24px) 16px calc(env(safe-area-inset-bottom) + 28px);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .brand {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 12px;
      }

      .icon {
        display: grid;
        width: 52px;
        height: 52px;
        flex: 0 0 auto;
        place-items: center;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        font-weight: 900;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.55rem, 5vw, 2.3rem);
        line-height: 1.05;
      }

      .eyebrow {
        color: #ff9678;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .link {
        min-height: 44px;
        flex: 0 0 auto;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 14px;
        color: var(--muted-strong);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
    <script defer src="/time/scope-employee-integration.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="icon">S</div>
          <div>
            <p class="eyebrow">Field test</p>
            <h1>Scope Test</h1>
          </div>
        </div>
        <a class="link" href="/time/">Clock</a>
      </header>

      <div
        id="scope-content-root"
        data-scope-employee-root
        data-scope-force-mount="true"
        data-scope-job-code="QS0358"
        data-scope-allow-idle-view="true"
      ></div>
    </main>
  </body>
</html>
