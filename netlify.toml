# Netlify site configuration
# Disable ALL automatic asset optimization — images are already optimized
# and Netlify's aggressive recompression was reducing quality by ~89%

[build.processing]
  skip_processing = true

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = false

[build.processing.images]
  compress = false

# Custom headers to prevent CDN-level image transformation
[[headers]]
  for = "/images.squarespace-cdn.com/*"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=31536000"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/static1.squarespace.com/*"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=31536000"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=31536000"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=31536000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=31536000"

[[headers]]
  for = "/time/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/time/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Robots-Tag = "noindex, nofollow"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/time"
  to = "/time/"
  status = 301

[[redirects]]
  from = "/time/*"
  to = "/time/index.html"
  status = 200
