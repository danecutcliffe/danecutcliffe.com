<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    <meta name="theme-color" content="#0f766e" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#da7756" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Time Clock" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="Mobile time tracking for job-site work." />
    <link rel="manifest" href="/time/manifest.json" />
    <link rel="icon" href="/time/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/time/icon.svg" />
    <title>Time Clock</title>
    <script defer src="/time/scope-admin-integration.js"></script>
    <script defer src="/time/scope-employee-integration.js"></script>
    <script>
      (() => {
        try {
          const preference = window.localStorage.getItem('time-clock-theme-preference');
          if (preference === 'light' || preference === 'dark') {
            document.documentElement.dataset.theme = preference;
            document.documentElement.style.colorScheme = preference === 'dark' ? 'dark' : 'light';
          } else {
            document.documentElement.style.colorScheme = 'light dark';
          }
        } catch {
          document.documentElement.style.colorScheme = 'light dark';
        }
      })();
    </script>
    <script type="module" crossorigin src="/time/assets/index-Dv7z7FQT.js"></script>
    <link rel="stylesheet" crossorigin href="/time/assets/index-DOJxKGn8.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
