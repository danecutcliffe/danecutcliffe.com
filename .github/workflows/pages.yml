name: Deploy site to GitHub Pages

# Replaces the legacy Pages build pipeline (which began failing generically on
# 2026-07-03 despite unchanged, valid content). The site is fully static with
# committed build output, so this just uploads the repo tree and deploys it.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Drop non-site files from the artifact
        run: rm -rf .git .github
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
